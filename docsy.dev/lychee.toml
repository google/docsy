# Lychee link-checker config for docsy.dev. Ported from `.htmltest.yml`; run via
# `npm run check:links:lychee`. See thoughtry projects/link-checking/lychee-docsy.

cache = true
max_cache_age = "375d"             # ~ .htmltest.yml CacheExpires: 9000h
no_progress = true
extensions = ["html"]              # built HTML only (htmltest checks .html)
include_fragments = "full"         # htmltest anchor checking (0.24.2: enum, not bool)
index_files = ["index.html"]       # resolve Hugo pretty-URL dir links to index.html

# .htmltest.yml IgnoreDirs.
exclude_path = [
  'blog/(\d+/)?page/\d+',  # blog pagination
  '/fr/',                  # French language pages
]

# .htmltest.yml IgnoreURLs.
exclude = [
  '^(https://www\.docsy\.dev/)?fr/',                  # French language pages
  '[?&]no-link-check',                                # opt-out query param
  '/index\.xml$',                                     # rel=alternate RSS links
  '^https?://[^/]+/(categories|tags)/',              # Docsy-generated taxonomy
  '^https?://localhost\b',
  '^https://github\.com/google/docsy/commit/',        # per-page provenance links (htmltest: data-proofer-ignore)
  '^https://github\.com/google/docsy/releases/v[\d.]+-dev',  # non-existent -dev versions
  '^https://deploy-preview-\d+--docsydocs\.netlify\.app',    # previews not yet served
  '^https?://github\.com/.*?/.*?/(new|edit)/',       # Docsy view/edit-source links
  '^https://github\.com/google/docsy/tree/main/docsy\.dev/content/en/',
  '^https://twitter\.com/docsydocs$',
  '^https://badges\.netlify\.com/api',
  '^https://code\.jquery\.com',
  '^https://www\.npmjs\.com/package/',                # bot-wall (403) on the package pages
  '^https://docsearch\.algolia\.com/',               # bot-wall (403) on the apply page
  '^https://prismjs\.com/download\.html#',           # download-builder state hash, not an anchor
  '^https://portal\.aws\.amazon\.com/',              # SPA signup flow, fragment is a client route

  # Remove after 0.16.0 ships: the release tag and the version dropdown's
  # "latest" links to pages new/draft in this cycle (absent on v0.15.0 prod).
  '^https://github\.com/google/docsy/releases/(tag/)?v0\.16\.0$',
  '^https://www\.docsy\.dev/docs/deployment/chrome/$',
  '^https://www\.docsy\.dev/blog/2026/0\.16\.0/$',
  '^https://www\.docsy\.dev/blog/2026/hugo-0\.158\.0\+/$',

  # Remove when content-rot fixes land (parked: chalin-m24-docsy-link-rot-2026-0626).
  # These externals are genuinely broken on this branch and fixed on that one;
  # excluded only to keep CI green until it lands, then this block goes away.
  '^https://github\.com/google/docsy/(blob|tree)/main/(assets|i18n|layouts|go\.mod)\b',  # theme moved under theme/
  '^https://developers\.google\.com/search/docs/beginner/seo-starter-guide',     # moved to fundamentals/
  '^https://mermaid-js\.github\.io/mermaid/#/Setup',                             # moved to mermaid.js.org
  # gohugo.io anchors renamed by a docs IA reorg (pages 200, fragments gone):
  '^https://gohugo\.io/about/features/#multi-dimensional-content-model',
  '^https://gohugo\.io/configuration/params/#multilingual-sites',
  '^https://gohugo\.io/content-management/front-matter/#front-matter-cascade',
  '^https://gohugo\.io/content-management/front-matter/#front-matter-parameters',
  '^https://gohugo\.io/content-management/image-processing/#image-processing-methods',
  '^https://gohugo\.io/content-management/image-processing/#image-processing-options',
  '^https://gohugo\.io/content-management/menus/#add-non-content-entries-to-a-menu',
  '^https://gohugo\.io/content-management/shortcodes/#shortcodes-with-markdown',
  '^https://gohugo\.io/getting-started/configuration/#configuration-file',
  '^https://gohugo\.io/getting-started/configuration/#configure-with-environment-variables',
  '^https://gohugo\.io/getting-started/directory-structure/#directory-structure-explained',
  '^https://gohugo\.io/getting-started/directory-structure/#union-file-system',
  '^https://gohugo\.io/getting-started/installing/#debian-and-ubuntu',
  '^https://gohugo\.io/getting-started/installing/#homebrew-macos',
  '^https://gohugo\.io/getting-started/installing/#linux',
  '^https://gohugo\.io/hugo-modules/configuration/#module-config-top-level',
  '^https://gohugo\.io/templates/embedded/#configure-google-analytics',
  '^https://gohugo\.io/templates/shortcode-templates/#output-format-specific-templates-shortcode-templates',
  '^https://gohugo\.io/variables/site/#the-siteparams-variable',
]
