# Lychee link-checker config for docsy.dev. Ported from `.htmltest.yml`; run via
# `npm run check:links`. Rationale: the maintainers' link-checking notes
# (internal ref `link-checking/lychee`; ask the dev lead).

cache = true
max_cache_age = "375d"             # ~ .htmltest.yml CacheExpires: 9000h
no_progress = true
extensions = ["html"]              # built HTML only (htmltest checks .html)
include_fragments = "full"         # htmltest anchor checking (0.24.2: enum, not bool)
index_files = ["index.html"]       # resolve Hugo pretty-URL dir links to index.html

# .htmltest.yml IgnoreDirs.
exclude_path = [
  'blog/(\d+/)?page/\d+',  # blog pagination
  '/fr/',                  # French language pages
]

# .htmltest.yml IgnoreURLs.
exclude = [
  '^(https://www\.docsy\.dev/)?fr/',                  # French language pages
  '[?&]link-check=no',                                # opt-out query param
  '/index\.xml$',                                     # rel=alternate RSS links
  '^https?://[^/]+/(categories|tags)/',              # Docsy-generated taxonomy
  '^https?://localhost\b',
  '^https://github\.com/google/docsy/commit/',        # per-page provenance links (htmltest: data-proofer-ignore)
  '^https://github\.com/google/docsy/releases/v[\d.]+-dev',  # non-existent -dev versions
  '^https://deploy-preview-\d+--docsydocs\.netlify\.app',    # previews not yet served
  '^https?://github\.com/.*?/.*?/(new|edit)/',       # Docsy view/edit-source links
  '^https://github\.com/google/docsy/tree/main/docsy\.dev/content/en/',
  '^https://twitter\.com/docsydocs$',
  '^https://badges\.netlify\.com/api',
  '^https://code\.jquery\.com',
  '^https://www\.npmjs\.com/package/',                # bot-wall (403) on the package pages
  '^https://docsearch\.algolia\.com/',               # bot-wall (403) on the apply page
  '^https://prismjs\.com/download\.html#',           # download-builder state hash, not an anchor
  '^https://portal\.aws\.amazon\.com/',              # SPA signup flow, fragment is a client route

  # Remove after 0.16.0 ships: the release tag and the version dropdown's
  # "latest" links to pages new/draft in this cycle (absent on v0.15.0 prod).
  '^https://github\.com/google/docsy/releases/(tag/)?v0\.16\.0$',
  '^https://www\.docsy\.dev/docs/deployment/chrome/$',
  '^https://www\.docsy\.dev/blog/2026/0\.16\.0/$',
  '^https://www\.docsy\.dev/blog/2026/hugo-0\.158\.0\+/$',
]
