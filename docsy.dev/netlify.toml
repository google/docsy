# Hugo build configuration for Netlify
# (https://gohugo.io/host-and-deploy/host-on-netlify/#configure-hugo-version-in-netlify)

# base = "docsy.dev" - set via web UI

[build]
publish = "docsy.dev/public"
command = "npm run -C docsy.dev build:preview"

[build.environment]
GO_VERSION = "1.25.5"
# Netlify clones into a dir named "repo"; the theme lives in repo's theme/ subdir.
HUGO_THEME = "repo/theme"

[context.production]
command = "npm run -C docsy.dev build:production"

[context.doc-rooted.environment]
TD_BUILD_CTX = "doc-rooted"

# Redirects for slug swap: /docs/adding-content/ → /docs/content/
[[redirects]]
  from = "/docs/adding-content/content"
  to = "/docs/content/adding-content"
  status = 301

[[redirects]]
  from = "/docs/adding-content/*"
  to = "/docs/content/:splat"
  status = 301

# cSpell:ignore docsy
