{{ $color := .Get "color" | default "primary" -}}
<div class="alert alert-{{ $color }}" role="alert">
{{ with .Get "title" -}}
  <h4 class="alert-heading">
    {{- . | safeHTML -}}
  </h4>
{{ end -}}
{{/* Do **not** remove this comment! It ends above html block! See https://spec.commonmark.org/0.30/#html-blocks, 7. */}}
{{ .Inner }}
</div>
