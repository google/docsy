{{ $color := .Get "color" | default "primary" -}}
<div class="alert alert-{{ $color }}" role="alert">
{{ with .Get "title" -}}
  <h4 class="alert-heading">
    {{- . | safeHTML -}}
  </h4>
{{ end -}}
{{ if .Get "markdownify" -}}
  {{ .Inner | markdownify }}
{{ else -}}
  {{ .Inner }}
{{ end -}}
</div>
